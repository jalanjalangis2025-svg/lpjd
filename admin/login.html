<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sistem Jalan Rusak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }

        .input-with-icon input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-with-icon input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }

        .form-footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link a:hover {
            color: #374151;
        }

        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-form {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-road"></i>
            <h1>Admin Dashboard</h1>
            <p>Sistem Informasi Jalan Rusak</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Email atau password salah</span>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email Admin</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@jalanrusak.id" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Masuk ke Dashboard</span>
            </button>
        </form>

        <div class="back-link">
            <a href="../public/index.html">
                <i class="fas fa-arrow-left"></i>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <script type="module">
        import { adminLogin } from '../shared/supabase.js'

        document.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('loginForm')
            const errorMessage = document.getElementById('errorMessage')
            const loginBtn = document.getElementById('loginBtn')

            loginForm.addEventListener('submit', async function (e) {
                e.preventDefault()

                const email = document.getElementById('email').value.trim()
                const password = document.getElementById('password').value

                // Validasi sederhana
                if (!email || !password) {
                    showError('Harap isi email dan password')
                    return
                }

                // Tampilkan loading
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...'
                loginBtn.disabled = true

                try {
                    const result = await adminLogin(email, password)

                    if (result.success) {
                        // Redirect ke dashboard
                        window.location.href = 'index.html'
                    } else {
                        showError(result.error || 'Login gagal')
                    }
                } catch (error) {
                    console.error('Login error:', error)
                    showError('Terjadi kesalahan. Silakan coba lagi.')
                } finally {
                    // Reset button
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Masuk ke Dashboard</span>'
                    loginBtn.disabled = false
                }
            })

            function showError(message) {
                document.getElementById('errorText').textContent = message
                errorMessage.classList.add('show')

                // Sembunyikan setelah 5 detik
                setTimeout(() => {
                    errorMessage.classList.remove('show')
                }, 5000)
            }

            // Cek jika sudah login
            const auth = localStorage.getItem('admin_auth')
            if (auth) {
                try {
                    const authData = JSON.parse(auth)
                    if (authData.loggedIn) {
                        // Redirect ke dashboard
                        window.location.href = 'index.html'
                    }
                } catch (error) {
                    localStorage.removeItem('admin_auth')
                }
            }
        })
    </script>
</body>

</html>
